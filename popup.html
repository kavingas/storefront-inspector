<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Commerce Events Debugger</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            font-size: 13px;
            background: #f4f4f4;
            color: #2c2c2c;
            width: 340px;
        }

        .header {
            background: #FA7300;
            color: #fff;
            padding: 10px 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .header-logo {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .header-title {
            font-size: 13px;
            font-weight: 600;
        }

        .content {
            padding: 20px 18px 22px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
            text-align: center;
            background: #fff;
        }

        .icon { font-size: 36px; }

        .message {
            font-size: 13px;
            color: #444;
            line-height: 1.6;
        }

        .steps {
            width: 100%;
            background: #f7f7f7;
            border: 1px solid #e4e4e4;
            border-radius: 6px;
            padding: 12px 16px;
            text-align: left;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .step {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            font-size: 12px;
            color: #444;
            line-height: 1.5;
        }

        .step-num {
            background: #FA7300;
            color: #fff;
            font-size: 10px;
            font-weight: 700;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            margin-top: 1px;
        }

        kbd {
            display: inline-block;
            background: #fff;
            border: 1px solid #ccc;
            border-radius: 3px;
            padding: 0 5px;
            font-family: inherit;
            font-size: 11px;
            color: #333;
            line-height: 18px;
            box-shadow: 0 1px 0 #bbb;
        }

        .tab-label {
            display: inline-block;
            background: #FA7300;
            color: #fff;
            font-size: 10px;
            font-weight: 700;
            border-radius: 3px;
            padding: 1px 6px;
            vertical-align: middle;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-logo">&#9679;</div>
        <div class="header-title">Commerce Events Debugger</div>
    </div>

    <div class="content">
        <div class="icon">&#128295;</div>
        <div class="message">All event debugging tools are available in the <strong>DevTools panel</strong>.</div>

        <div class="steps">
            <div class="step">
                <div class="step-num">1</div>
                <div>Open DevTools — press <kbd>F12</kbd> or <kbd>⌥⌘I</kbd></div>
            </div>
            <div class="step">
                <div class="step-num">2</div>
                <div>Select the <span class="tab-label">Commerce Events</span> tab</div>
            </div>
            <div class="step">
                <div class="step-num">3</div>
                <div>Navigate your storefront page to capture events in real time</div>
            </div>
        </div>
    </div>
</body>
</html>
